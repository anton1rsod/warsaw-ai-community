name: CI

# Pre-merge gate: lint + typecheck + tests + build must pass before any PR
# merges to main. Vercel's preview deploy proves the build compiles, but
# doesn't run unit/integration tests — this workflow closes that gap.
#
# Injection safety: no user-controlled inputs (issue titles, PR bodies,
# commit messages, branch names) are interpolated into any `run:` command.
# All commands are hardcoded `pnpm` invocations.
#
# E2E (Playwright) is intentionally NOT in CI for v0.1. It requires a
# running dev server or a deployed preview URL with auth bypass, both of
# which add complexity not justified at this stage. Run `pnpm e2e` locally
# before pushing significant changes.

on:
  pull_request:
    paths:
      - 'projects/community-platform/**'
      - 'community/**'
      - 'persona-builder/personas/**/*.public.md'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
      - warsaw-org-and-stack-guide

# Cancel in-progress runs on the same branch when a new commit lands.
# Saves runner minutes; only the latest commit's verdict matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: projects/community-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # build-contributions.ts scans `git log` to attribute commits to
          # roster handles. Default shallow checkout (depth 1) skips all
          # history and yields zero counts; the script tolerates that
          # post-fix, but accurate counts on CI need full history.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/community-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        # `next build` collects page data, which triggers module init on
        # every route — including `lib/env.ts` whose Zod schema rejects
        # missing values at import. Real secrets are not in CI; the values
        # below are dummies that satisfy the schema (`min(32)` for HMAC
        # secrets, valid URL for `NEXTAUTH_URL`). No GitHub API calls
        # happen during build, so stub credentials are safe.
        env:
          NEXTAUTH_SECRET: '0123456789abcdef0123456789abcdef0123456789'
          NEXTAUTH_URL: 'http://localhost:3000'
          GITHUB_OAUTH_CLIENT_ID: 'ci-stub-client-id'
          GITHUB_OAUTH_CLIENT_SECRET: 'ci-stub-client-secret'
          GITHUB_APP_ID: '0'
          GITHUB_APP_PRIVATE_KEY: 'ci-stub-private-key-not-real'
          GITHUB_APP_INSTALLATION_ID: '0'
          GITHUB_REPO_OWNER: 'ci-stub-owner'
          GITHUB_REPO_NAME: 'ci-stub-repo'
          COMMUNITY_NAME: 'CI Build'
          COMMUNITY_SLUG: 'ci-build'
          INVITE_SECRET: 'ci-stub-invite-secret-min-32-chars'
        run: pnpm build
