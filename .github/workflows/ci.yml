name: CI

# Pre-merge gate: lint + typecheck + tests + build must pass before any PR
# merges to main. Vercel's preview deploy proves the build compiles, but
# doesn't run unit/integration tests — this workflow closes that gap.
#
# Injection safety: no user-controlled inputs (issue titles, PR bodies,
# commit messages, branch names) are interpolated into any `run:` command.
# All commands are hardcoded `pnpm` invocations.
#
# E2E (Playwright) is intentionally NOT in CI for v0.1. It requires a
# running dev server or a deployed preview URL with auth bypass, both of
# which add complexity not justified at this stage. Run `pnpm e2e` locally
# before pushing significant changes.

on:
  pull_request:
    paths:
      - 'projects/community-platform/**'
      - 'community/**'
      - 'persona-builder/personas/**/*.public.md'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
      - warsaw-org-and-stack-guide

# Cancel in-progress runs on the same branch when a new commit lands.
# Saves runner minutes; only the latest commit's verdict matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: projects/community-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # build-contributions.ts scans `git log` to attribute commits to
          # roster handles. Default shallow checkout (depth 1) skips all
          # history and yields zero counts; the script tolerates that
          # post-fix, but accurate counts on CI need full history.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/community-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
