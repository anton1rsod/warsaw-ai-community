name: build-index

on:
  push:
    branches: [main]
    paths:
      - 'community/archive/**'
      - '!community/archive/_index/**'
      - '!community/archive/_removed/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GBRAIN_BOT_INDEX_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: projects/gbrain/app/package-lock.json

      - name: Install
        working-directory: projects/gbrain/app
        run: npm ci

      - name: Build index
        working-directory: projects/gbrain/app
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: npx tsx scripts/build-index.ts

      - name: Commit if changed
        run: |
          git config user.name "gbrain-index-bot"
          git config user.email "gbrain-index-bot@users.noreply.github.com"
          git add community/archive/_index/
          # Defense-in-depth on assertAllowedPath: discard stray out-of-bounds
          # untracked files from prior incomplete runs (per ADR-0008 §3.6).
          # Staged _index/* files survive (clean only removes untracked).
          git clean -fd community/archive/
          if git diff --staged --quiet; then
            echo "Index unchanged; skipping commit."
            exit 0
          fi
          git commit -m "chore(gbrain): rebuild index ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push

      - name: Summary
        if: always()
        run: |
          if [ -f community/archive/_index/manifest.json ]; then
            echo "## Build summary" >> "$GITHUB_STEP_SUMMARY"
            jq '.stats' community/archive/_index/manifest.json >> "$GITHUB_STEP_SUMMARY"
          fi
